{% extends "base.html" %}
{% block title %}{% endblock %}
{% block content %}
<form method="post">
    <div style="background-color: rgba(255, 165, 0, 0.6); padding: 20px; border-radius: 5px; width: 300px; margin: auto;">
        <button type="submit" name="view_requests" id="view_requests" style="display: block; width: 100%; padding: 10px; margin-bottom: 10px; background-color: green; color: white; border: none; border-radius: 4px;">צפה בבקשות קיימות</button>
        <button type="submit" name="add_request" id="add_request" style="display: block; width: 100%; padding: 10px; margin-bottom: 10px; background-color: green; color: white; border: none; border-radius: 4px;">הוסף בקשת החרגה</button>
        <button type="submit" name="add_user" id="add_user" style="display: block; width: 100%; padding: 10px; background-color: green; color: white; border: none; border-radius: 4px;">הוסף משתמש</button>
    </div>
</form>
{% endblock %}
