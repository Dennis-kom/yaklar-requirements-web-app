<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
</head>
<body style="background-color: rgba(210, 220, 220, 0.85); margin: 0; padding: 0;">
    <div style="text-align: center; padding: 20px; font-family: David; font-weight: bold; font-size: 38px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);">
        ממשק בקשות להחרגה
    </div>

    <div style="display: flex; justify-content: space-between; align-items: flex-start; padding: 10px;">
        <div style="display: flex; flex-direction: column; align-items: flex-start;">
            <a href="{{ url_for('users.logout') }}" style="text-decoration: none; margin-top: 10px; margin-left: 20px;">
                <button style="padding: 10px 15px; background-color: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; font-family: David; font-weight: bold;">
                    התנתקות
                </button>
            </a>
        </div>
        <img src="{{ url_for('static', filename='symb.jpg') }}"  style="height: 100px;"  alt=""/>
    </div>
    {% block content %}
    {% endblock %}
</body>
</html>
